<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="A GBA-style interactive bio world built with Zig WebAssembly and Canvas 2D.">
    <meta property="og:title" content="FRKN DIMBO - GBA Bio World">
    <meta property="og:description" content="Walk through a GBA-style MedaTown bio and visit profile houses.">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#263b42">
    <title>FRKN DIMBO - GBA Bio World</title>
    <link rel="stylesheet" href="style.css">
    <script src="preloader.js" defer></script>
    <script src="game.js" defer></script>
</head>
<body>
    <main class="game-stage" aria-label="GBA-style interactive bio">
        <section class="gba-shell" aria-label="Game screen">
            <div class="brand-strip">
                <span>ZigBio Advance</span>
                <span>WASM-32</span>
            </div>

            <div class="screen-bezel">
                <canvas id="game-canvas" width="240" height="160" aria-label="Playable GBA neighborhood portfolio world"></canvas>

                <div class="hud-layer" aria-live="polite">
                    <div class="hud-pill" id="area-label">MEDA MAP</div>
                    <div class="hud-pill" id="status-label">LOADING</div>
                </div>

                <div class="hint-banner" id="hint-banner">D-PAD: MOVE / A: VISIT</div>
            </div>

            <div class="console-controls" aria-hidden="true">
                <div class="dpad-mark">
                    <span></span><span></span><span></span><span></span>
                </div>
                <div class="console-speaker"><i></i><i></i><i></i><i></i></div>
                <div class="ab-mark"><span>A</span><span>B</span></div>
            </div>
        </section>

        <section class="bio-panel" aria-label="Bio summary">
            <p class="kicker">PLAYER BIO</p>
            <h1>FRKN DIMBO</h1>
            <p>Interactive maker profile. Use the map to find each neighborhood hub.</p>
        </section>
    </main>

    <div class="loading-screen" id="loading-screen">
        <div class="loading-box">
            <p>BOOTING ZIGBIO</p>
            <div class="load-bar"><span id="load-progress"></span></div>
        </div>
    </div>

    <div class="game-popup" id="game-popup" role="dialog" aria-modal="true" aria-labelledby="popup-title" hidden>
        <div class="popup-icon" id="popup-icon" aria-hidden="true">GH</div>
        <div>
            <p class="popup-label">PORTAL READY</p>
            <h2 id="popup-title">GitHub</h2>
            <p id="popup-copy">Mau berkunjung?</p>
        </div>
        <div class="popup-actions">
            <button class="primary-btn" id="visit-btn" type="button" aria-label="Visit selected profile">YA</button>
            <button class="ghost-btn" id="cancel-btn" type="button" aria-label="Close profile portal">TIDAK</button>
        </div>
    </div>

    <div class="mobile-controls" id="mobile-controls" aria-label="Touch controls">
        <div class="joystick" id="joystick" role="application" aria-label="Virtual movement joystick">
            <span id="joystick-knob"></span>
        </div>
        <button class="action-button" id="action-button" type="button" aria-label="Visit active profile">A</button>
    </div>

    <div class="white-transition" id="white-transition" aria-hidden="true"></div>
</body>
</html>
